<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Detail</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <header>
    <div class="container">
      <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
        <img src="/logo.png" alt="Kisah 5 Menit" style="width: 48px; height: 48px;">
        <div>
          <h1 style="margin: 0; font-size: 1.5rem; color: #1a1a1a;">Kisah 5 Menit</h1>
          <p style="margin: 0; font-size: 0.875rem; color: #666;">Cerita seru dalam 5 menit</p>
        </div>
      </a>
    </div>
  </header>

  <div class="container" style="padding-top: 2rem;">
    <a href="/" class="back-link">← Back to Home</a>

    <div id="storyContent" class="story-detail">
      <!-- Content injected here -->
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-container">
      <div class="footer-content">
        <img src="/logo.png" alt="Kisah 5 Menit Logo" class="footer-logo">
        <p class="footer-text">Cerita pendek 5 menit yang menyentuh dan seru</p>
        <p class="footer-copyright">© 2025 Kisah 5 Menit • Made with ❤️</p>
      </div>
    </div>
  </footer>

  <script>
    async function loadStory() {
      const slug = window.location.pathname.substring(1); // Remove leading slash
      const res = await fetch(`/api/stories/${slug}`);

      if (!res.ok) {
        document.getElementById('storyContent').innerHTML = '<h1>Story not found</h1>';
        return;
      }

      const story = await res.json();
      document.title = story.title;

      document.getElementById('storyContent').innerHTML = `
        <div class="story-header">
          <div class="card-meta">${story.genre.toUpperCase()} • ${story.meta.reading_time_minutes} MIN READ</div>
          <h1>${story.title}</h1>
          <div class="card-theme">${story.theme}</div>
        </div>
        <center>
          <img src="${story.cover.image_url || ''}" class="story-cover" alt="Cover Art" style="max-width: 300px; border-radius: 8px; margin: 2rem 0;">
        </center>
        <div class="story-body">${marked.parse(story.content.body)}</div>
        <div style="margin-top: 2rem; padding: 1.5rem; background: #f5f5f5; border-radius: 8px;">
          <p style="margin: 0; color: #666;"><strong>Tags:</strong> ${story.tags.map(tag => `<span style="background: white; padding: 0.25rem 0.75rem; border-radius: 12px; display: inline-block; margin: 0.25rem; font-size: 0.875rem;">#${tag}</span>`).join('')}</p>
        </div>
      `;
    }

    loadStory();
  </script>
</body>

</html>
