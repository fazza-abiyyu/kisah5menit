<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Will be dynamically updated -->
  <title>Loading...</title>
  <meta name="description" content="Baca cerita pendek Indonesia yang menarik dan seru di Cerita 5 Menit">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="xKXhXdDFMOe26zXW5IJnd7gCStzIWD6RfErfVQ-Nops" />
  <!-- Open Graph - Will be dynamically updated -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Cerita 5 Menit">
  <meta property="og:locale" content="id_ID">

  <!-- Twitter Card - Will be dynamically updated -->
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/style.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-brand">
        <img src="/logo.png" alt="Cerita 5 Menit" class="logo">
        <div class="brand-text">
          <h2 class="brand-name">Cerita 5 Menit</h2>
          <p class="brand-tagline">Cerita pendek untuk menemani waktu</p>
        </div>
      </div>
      <nav class="nav-links">
        <!-- Empty nav for consistency -->
      </nav>
    </div>
  </header>

  <div class="container" style="padding-top: 2rem;">
    <a href="/" class="back-link">← Back to Home</a>

    <div id="storyContent" class="story-detail">
      <!-- Content injected here -->
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-container">
      <div class="footer-content">
        <img src="/logo.png" alt="Cerita 5 Menit Logo" class="footer-logo">
        <p class="footer-text">Cerita pendek yang menemani hari-harimu</p>
        <p class="footer-copyright">© 2025 Cerita 5 Menit • Made with ❤️</p>
      </div>
    </div>
  </footer>

  <script>
    function updateMetaTags(story) {
      const baseUrl = 'https://cerita5menit.vanila.app';
      const storyUrl = `${baseUrl}/${story.slug}`;
      const imageUrl = story.cover?.image_url ? `${baseUrl}${story.cover.image_url}` : `${baseUrl}/logo.png`;

      // Update title
      document.title = `${story.title} - Cerita 5 Menit`;

      // Update or create meta tags
      const metaTags = {
        'description': story.theme || story.title,
        'keywords': story.tags.join(', '),
        'author': 'Cerita 5 Menit',
        'og:title': story.title,
        'og:description': story.theme || story.title,
        'og:url': storyUrl,
        'og:image': imageUrl,
        'twitter:title': story.title,
        'twitter:description': story.theme || story.title,
        'twitter:image': imageUrl
      };

      Object.entries(metaTags).forEach(([key, value]) => {
        const isOg = key.startsWith('og:');
        const isTwitter = key.startsWith('twitter:');
        const attr = isOg || isTwitter ? 'property' : 'name';

        let meta = document.querySelector(`meta[${attr}="${key}"]`);
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute(attr, key);
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', value);
      });

      // Add canonical link
      let canonical = document.querySelector('link[rel="canonical"]');
      if (!canonical) {
        canonical = document.createElement('link');
        canonical.rel = 'canonical';
        document.head.appendChild(canonical);
      }
      canonical.href = storyUrl;

      // Add JSON-LD structured data for Article
      const articleSchema = {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": story.title,
        "description": story.theme,
        "image": imageUrl,
        "datePublished": story.created_at,
        "dateModified": story.updated_at,
        "author": {
          "@type": "Organization",
          "name": "Cerita 5 Menit"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Cerita 5 Menit",
          "logo": {
            "@type": "ImageObject",
            "url": `${baseUrl}/logo.png`
          }
        },
        "mainEntityOfPage": {
          "@type": "WebPage",
          "@id": storyUrl
        },
        "genre": story.genre,
        "keywords": story.tags.join(', '),
        "wordCount": story.content.body.split(/\s+/).length,
        "timeRequired": `PT${story.meta.reading_time_minutes}M`
      };

      // Add JSON-LD for BreadcrumbList
      const breadcrumbSchema = {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": baseUrl
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": story.title,
            "item": storyUrl
          }
        ]
      };

      // Remove old schema if exists
      document.querySelectorAll('script[type="application/ld+json"]').forEach(el => el.remove());

      // Add new schemas
      const articleScript = document.createElement('script');
      articleScript.type = 'application/ld+json';
      articleScript.textContent = JSON.stringify(articleSchema);
      document.head.appendChild(articleScript);

      const breadcrumbScript = document.createElement('script');
      breadcrumbScript.type = 'application/ld+json';
      breadcrumbScript.textContent = JSON.stringify(breadcrumbSchema);
      document.head.appendChild(breadcrumbScript);
    }

    async function loadStory() {
      const slug = window.location.pathname.substring(1);
      const res = await fetch(`/api/stories/${slug}`);

      if (!res.ok) {
        document.getElementById('storyContent').innerHTML = '<h1>Story not found</h1>';
        document.title = 'Story Not Found - Cerita 5 Menit';
        return;
      }

      const story = await res.json();

      // Update SEO meta tags
      updateMetaTags(story);

      document.getElementById('storyContent').innerHTML = `
        <div class="story-header">
          <div class="card-meta">${story.genre.toUpperCase()} • ${story.meta.reading_time_minutes} MIN READ</div>
          <h1>${story.title}</h1>
          <div class="card-theme">${story.theme}</div>
        </div>
        <center>
          <img src="${story.cover.image_url || ''}" class="story-cover" alt="${story.title}" style="max-width: 300px; border-radius: 8px; margin: 2rem 0;">
        </center>
        <div class="story-body">${marked.parse(story.content.body)}</div>
        <div style="margin-top: 2rem; padding: 1.5rem; background: #f5f5f5; border-radius: 8px;">
          <p style="margin: 0; color: #666;"><strong>Tags:</strong> ${story.tags.map(tag => tag.toLowerCase()).join(', ')}</p>
        </div>
      `;
    }

    loadStory();
  </script>
</body>

</html>
