<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Detail</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="container">
    <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    <div id="storyContent" class="story-detail">
      <!-- Content injected here -->
    </div>
  </div>

  <script>
    async function loadStory() {
      const slug = window.location.pathname.substring(1); // Remove leading slash
      const res = await fetch(`/api/stories/${slug}`);

      if (!res.ok) {
        document.getElementById('storyContent').innerHTML = '<h1>Story not found</h1>';
        return;
      }

      const story = await res.json();
      document.title = story.title;

      document.getElementById('storyContent').innerHTML = `
        <div class="story-header">
          <div class="card-meta">${story.genre} • ${story.meta.reading_time_minutes} min read</div>
          <h1>${story.title}</h1>
          <div class="card-theme">${story.theme}</div>
        </div>
        <center>
          <img src="${story.cover.image_url || ''}" class="story-cover" alt="Cover Art" style="max-width: 300px;">
        </center>
        <div class="story-body">${marked.parse(story.content.body)}</div>
        <div style="margin-top: 2rem; color: #666; font-size: 0.9rem;">
          <p><strong>Tags:</strong> ${story.tags.join(', ')}</p>
        </div>
      `;
    }

    loadStory();
  </script>
</body>

</html>
