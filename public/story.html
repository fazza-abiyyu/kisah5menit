<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Detail</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <header>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
        <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
          <img src="/logo.png" alt="Kisah 5 Menit" style="width: 48px; height: 48px;">
          <div>
            <h1 style="margin: 0; font-size: 1.5rem; color: #1a1a1a;">Kisah 5 Menit</h1>
            <p style="margin: 0; font-size: 0.875rem; color: #666;">Cerita seru dalam 5 menit</p>
          </div>
        </a>
      </div>
      <a href="/" class="back-link">← Back to Home</a>
    </div>
  </header>
  <div class="container">

    <div id="storyContent" class="story-detail">
      <!-- Content injected here -->
    </div>
  </div>

  <script>
    async function loadStory() {
      const slug = window.location.pathname.substring(1); // Remove leading slash
      const res = await fetch(`/api/stories/${slug}`);

      if (!res.ok) {
        document.getElementById('storyContent').innerHTML = '<h1>Story not found</h1>';
        return;
      }

      const story = await res.json();
      document.title = story.title;

      document.getElementById('storyContent').innerHTML = `
        <div class="story-header">
          <div class="card-meta">${story.genre} • ${story.meta.reading_time_minutes} min read</div>
          <h1>${story.title}</h1>
          <div class="card-theme">${story.theme}</div>
        </div>
        <center>
          <img src="${story.cover.image_url || ''}" class="story-cover" alt="Cover Art" style="max-width: 300px;">
        </center>
        <div class="story-body">${marked.parse(story.content.body)}</div>
        <div style="margin-top: 2rem; color: #666; font-size: 0.9rem;">
          <p><strong>Tags:</strong> ${story.tags.join(', ')}</p>
        </div>
      `;
    }

    loadStory();
  </script>
</body>

</html>
